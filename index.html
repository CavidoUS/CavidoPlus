<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="darkmode.js" defer></script>
    <link rel="icon" type="image/png" href="you did it!.png">
    <title>Cavido plus</title>
</head>
<body class="">
    <button id="theme-switch">
        <img src="Logo(2).png" width="30" height="30">    
    </button>
</div> 

<script src="index.js"></script>
</body>

    <div class="mytabs">
        <input type="radio" id="tab1" name="mytabs" checked="checked">
        <label for="tab1">Download</label>
        <div class="tab">
            <button class="B">
                <a href="CavidoPlus.desktop" download>Download app <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M5 20q-.825 0-1.413-.588Q3 18.825 3 18v-2h2v2h14v-2h2v2q0 .825-.588 1.412Q19.825 20 19 20Zm7-5-5-5 1.4-1.4 2.6 2.6V4h2v7.2l2.6-2.6L17 10Z"/>
                  </svg>
                  </a>
            </button>
            <button class="A">
            <a href="H-Search.desktop" download>Download H-Search<svg xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M5 20q-.825 0-1.413-.588Q3 18.825 3 18v-2h2v2h14v-2h2v2q0 .825-.588 1.412Q19.825 20 19 20Zm7-5-5-5 1.4-1.4 2.6 2.6V4h2v7.2l2.6-2.6L17 10Z"/>
              </svg></a>
              </button>
            </body>
        </div>

       <input type="radio" id="tab2" name="mytabs">
        <label for="tab2">Text</label>
        <div class="tab">
            <h2>Text</h2>
            <textarea>Insert Text</textarea>
        </div> 

        <input type="radio" id="tab4" name="mytabs">
        <label for="tab4">CP</label>
        <div class="tab">
            <h2>Works with</h2>
            <img src="download (1).jpeg">
            <img src="download.png">
            <img src="logo.png">
            <img src="linux.png">
        </div>

        <input type="radio" id="tab5" name="mytabs">
        <label for="tab5">H-Search</label>
        <div class="tab">
            <div class="container" style="text-align: center;">
                <h1>H-Search</h1>
                <form action="https://www.bing.com/search/" method="GET" id="search-form" target="_blank">
                    <input type="text" name="q" placeholder="Search Here"><br>
                </form>
            </div>
        </div>

        <input type="radio" id="tab3" name="mytabs">
        <label for="tab3">Calculator</label>
        <div class="tab">
            <h2>Calculator</h2>
            <div id="calculator">
                <input type="text" id="display" readonly>
                <div id="keys">
                    <button onclick="appendToDisplay('+')" class="operator">+</button>
                    <button onclick="appendToDisplay('7')">7</button>
                    <button onclick="appendToDisplay('8')">8</button>
                    <button onclick="appendToDisplay('9')">9</button>
                    <button onclick="appendToDisplay('-')" class="operator">-</button>
                    <button onclick="appendToDisplay('4')">4</button>
                    <button onclick="appendToDisplay('5')">5</button>
                    <button onclick="appendToDisplay('6')">6</button>
                    <button onclick="appendToDisplay('*')" class="operator">*</button>
                    <button onclick="appendToDisplay('1')">1</button>
                    <button onclick="appendToDisplay('2')">2</button>
                    <button onclick="appendToDisplay('3')">3</button>
                    <button onclick="appendToDisplay('/')" class="operator">/</button>
                    <button onclick="appendToDisplay('0')">0</button>
                    <button onclick="appendToDisplay('.')">.</button>
                    <button onclick="calculate()">=</button>
                    <button onclick="clearDisplay()" class="operator">C</button>
                </div>
            </div>
        </div>
        
    </div>
</body>
</html>
